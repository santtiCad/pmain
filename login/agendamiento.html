<!DOCTYPE html>
<html lang="en">

<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Agendamiento</title>

    <!-- CSS -->
     <link rel="stylesheet" href="estilos/estilos.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
</head>

<body>
 
    <nav class="navbar navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="../index.html">
                <img src="img/fisiio-zen.png" alt="" width="75px" height="75px" class="d-inline-block align-text-center">Fisio-Zen
            </a>
        </div>
        </div>
    </nav>
    <h1>¡Agenda tu cita!</h1>

    <form class="agenda-form">

        <div class="campo">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" name="nombre">
        </div>

        <div class="campo">
            <label for="apellido">Apellido</label>
            <input type="text" id="apellido" name="apellido">
        </div>

        <div class="campo">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" name="email">
        </div>

        <div class="campo">
            <label for="servicio">Servicio de intereses</label>
            <select id="servicio" name="servicio">
                <option value="consultoria">Consultoría</option>
                <option value="tutoria">Seguimiento</option>
                <option value="asesoria">Asesoría</option>
            </select>
        </div>

        <div class="campo">
            <label for="descripcion">Cuéntanos sobre tu caso</label>
            <textarea id="descripcion" name="descripcion" rows="4"></textarea>
        </div>

        <button type="submit">Agendar Cita</button>
        <a href="iniciosesion.html">Volver a Inicio de Sesión</a>

    </form>

    <div>
        <a href="iniciosesion.html">
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"

        crossorigin="anonymous"></script>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>
</html>
